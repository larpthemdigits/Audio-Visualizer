<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wishedletters</title>
  <meta name="description" content="wishedletters" />
  <meta property="og:title" content="wishedletters" />
  <meta property="og:description" content="girls <3 my swag" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://w.soundcloud.com/player/api.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow-x: hidden;
    }

    .particles { position: absolute; inset: 0; pointer-events: none; }
    .particle {
      position: absolute; width: 3px; height: 3px;
      border-radius: 50%; background: rgba(255,255,255,0.4);
      animation: float 8s ease-in-out infinite;
    }
    .particle:nth-child(odd) { background: rgba(255,255,255,0.6); width: 4px; height: 4px; }
    .particle:nth-child(3n)  { background: rgba(255,255,255,0.25); width: 2px; height: 2px; }
    @keyframes float {
      0%,100% { transform: translateY(0) translateX(0); opacity: 0.4; }
      25%      { transform: translateY(-30px) translateX(10px); opacity: 0.8; }
      50%      { transform: translateY(-15px) translateX(-10px); opacity: 0.5; }
      75%      { transform: translateY(-40px) translateX(5px); opacity: 0.9; }
    }

    .profile-card {
      display: flex; flex-direction: column; align-items: center;
      gap: 1.25rem; padding: 2.5rem 2rem;
      width: 100%; max-width: 500px;
      position: relative; z-index: 1;
    }

    .avatar-ring {
      padding: 4px;
      background: linear-gradient(135deg, #9333ea, #a855f7, #d8b4fe);
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(147,51,234,0.6), 0 0 60px rgba(168,85,247,0.25);
      animation: pulse-ring 3s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%,100% { box-shadow: 0 0 30px rgba(147,51,234,0.6), 0 0 60px rgba(168,85,247,0.25); }
      50%      { box-shadow: 0 0 50px rgba(147,51,234,0.9), 0 0 100px rgba(168,85,247,0.5); }
    }
    .avatar-wrapper { width: 130px; height: 130px; border-radius: 50%; overflow: hidden; background: #111; border: 3px solid #000; }
    .avatar-img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .username { font-size: 1.75rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; text-shadow: 0 0 20px rgba(147,51,234,0.6); }
    .tagline   { font-size: 0.75rem; color: rgba(216,180,254,0.7); letter-spacing: 0.05em; text-transform: uppercase; }

    .socials { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; margin-top: 0.5rem; }
    .social-btn {
      display: flex; align-items: center; gap: 0.875rem;
      padding: 0.875rem 1.25rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(147,51,234,0.25);
      border-radius: 14px; color: #e2e8f0; text-decoration: none;
      transition: all 0.25s ease; backdrop-filter: blur(10px);
      position: relative; overflow: hidden;
    }
    .social-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(147,51,234,0.12), rgba(168,85,247,0.06));
      opacity: 0; transition: opacity 0.25s ease; border-radius: inherit;
    }
    .social-btn:hover { transform: translateY(-2px); border-color: rgba(147,51,234,0.6); box-shadow: 0 8px 25px rgba(147,51,234,0.25); color: #fff; }
    .social-btn:hover::before { opacity: 1; }
    .social-btn:active { transform: translateY(0); }
    .social-icon { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 10px; background: rgba(147,51,234,0.18); color: #a855f7; flex-shrink: 0; }
    .social-icon svg { width: 22px; height: 22px; fill: currentColor; }
    .social-name { font-weight: 600; font-size: 0.95rem; flex: 1; }
    .social-label { font-size: 0.75rem; color: rgba(216,180,254,0.6); }

    /* ── Music Player ── */
    .music-player {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(147,51,234,0.25);
      border-radius: 14px;
      padding: 1rem 1.25rem 1.25rem;
      backdrop-filter: blur(10px);
      margin-top: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
      position: relative;
      overflow: hidden;
    }
    .music-player::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(147,51,234,0.12), rgba(168,85,247,0.06));
      border-radius: inherit;
      pointer-events: none;
    }

    /* Top row: artwork + title/artist */
    .music-info {
      display: flex;
      align-items: center;
      gap: 0.875rem;
    }

    .music-artwork {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: #1a1a2e;
      /* placeholder gradient until image loads */
      background: linear-gradient(135deg, #1a1a2e, #2d1b69);
    }

    .music-text {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      min-width: 0;
    }
    .music-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .music-artist {
      font-size: 0.75rem;
      color: rgba(216,180,254,0.55);
    }

    /* Progress bar */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .time-label {
      font-size: 0.65rem;
      color: rgba(216,180,254,0.5);
      flex-shrink: 0;
      min-width: 28px;
      font-variant-numeric: tabular-nums;
    }
    .time-label:last-child { text-align: right; }

    /* Custom range with purple fill via CSS variable */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      background: linear-gradient(
        to right,
        #a855f7 0%,
        #a855f7 var(--seek-pct, 0%),
        rgba(147,51,234,0.25) var(--seek-pct, 0%),
        rgba(147,51,234,0.25) 100%
      );
    }
    input[type=range]#vol {
      background: linear-gradient(
        to right,
        #a855f7 0%,
        #a855f7 var(--vol-pct, 80%),
        rgba(147,51,234,0.25) var(--vol-pct, 80%),
        rgba(147,51,234,0.25) 100%
      );
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #a855f7;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(147,51,234,0.7);
    }
    input[type=range]::-moz-range-thumb {
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #a855f7;
      cursor: pointer;
      border: none;
    }

    /* Controls row */
    .music-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    /* Skip buttons */
    .skip-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(216,180,254,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.25rem;
      transition: color 0.2s, transform 0.15s;
    }
    .skip-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .skip-btn:hover { color: #fff; transform: scale(1.1); }
    .skip-btn:active { transform: scale(0.95); }

    /* Main play button — large, glowing purple circle */
    .play-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #9333ea, #a855f7);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 20px rgba(147,51,234,0.6), 0 0 40px rgba(168,85,247,0.25);
    }
    .play-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .play-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .play-btn:not(:disabled):hover {
      transform: scale(1.08);
      box-shadow: 0 0 30px rgba(147,51,234,0.9), 0 0 60px rgba(168,85,247,0.4);
    }
    .play-btn:not(:disabled):active { transform: scale(0.95); }

    .click-hint {
      font-size: 0.7rem;
      color: rgba(216,180,254,0.5);
      text-align: center;
      font-style: italic;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

    @media (max-width: 480px) {
      .profile-card { padding: 2rem 1.25rem; }
      .username { font-size: 1.5rem; }
      .avatar-wrapper { width: 110px; height: 110px; }
    }
  </style>
</head>
<body>

<!-- Hidden SoundCloud iframe — controls the audio -->
<iframe
  id="sc-player"

  style="position:absolute;left:-9999px;width:1px;height:1px;"

></iframe>

<div class="particles" id="particles"></div>

<div class="profile-card">

  <div class="avatar-ring">

  <!-- Music Player -->
  <div class="music-player">

    <!-- Artwork + track info -->
    <div class="music-info">
      <img
        class="music-artwork"
        id="artwork"
        src="https://i1.sndcdn.com/artworks-000000000000000-000000-t200x200.jpg"
        alt="Album art"
        onerror="this.style.background='linear-gradient(135deg,#1a1a2e,#2d1b69)'; this.removeAttribute('src');"
      />
      <div class="music-text">
        <span class="music-title">cinco de mayo was a nightmare lol</span>
        <span class="music-artist">o_o</span>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="progress-wrap">
      <span class="time-label" id="pos">0:00</span>
      <input type="range" id="seek" min="0" max="100" value="0" aria-label="Seek" />
      <span class="time-label" id="dur">0:00</span>
    </div>

    <!-- Controls: skip back | play/pause | skip forward -->
    <div class="music-controls">
      <button class="skip-btn" id="prevBtn" aria-label="Skip back">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>

      <button class="play-btn" id="playBtn" disabled aria-label="Play">
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>

      <button class="skip-btn" id="nextBtn" aria-label="Skip forward">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
    </div>

    <p class="click-hint" id="hint">loading music...</p>
  </div>

</div>

<script>
  // Particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.top = (i * 5 + 5) + '%';
    p.style.left = (i * 5 + 2) + '%';
    p.style.animationDelay = (-i * 0.4) + 's';
    p.style.animationDuration = (7 + Math.random() * 4) + 's';
    container.appendChild(p);
  }

  // SoundCloud Widget
  const PLAY_ICON  = '<path d="M8 5v14l11-7z"/>';
  const PAUSE_ICON = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

  function fmt(ms) {
    const s = Math.floor(ms / 1000), m = Math.floor(s / 60);
    return m + ':' + String(s % 60).padStart(2, '0');
  }

  // Update seek bar purple fill
  function updateSeekFill(value, max) {
    const pct = max > 0 ? (value / max) * 100 : 0;
    document.getElementById('seek').style.setProperty('--seek-pct', pct + '%');
  }

  const playBtn = document.getElementById('playBtn');
  const hint    = document.getElementById('hint');
  const seekBar = document.getElementById('seek');
  const posEl   = document.getElementById('pos');
  const durEl   = document.getElementById('dur');
  let playing = false, duration = 0;

  const widget = SC.Widget(document.getElementById('sc-player'));

  widget.bind(SC.Widget.Events.READY, () => {
    playBtn.disabled = false;
    hint.style.display = 'none';
    widget.setVolume(80);

    // Try to get artwork URL from the widget
    widget.getCurrentSound((sound) => {
      if (sound && sound.artwork_url) {
        const artworkEl = document.getElementById('artwork');
        artworkEl.src = sound.artwork_url.replace('-large', '-t200x200');
      }
    });
  });

  widget.bind(SC.Widget.Events.PLAY, () => {
    playing = true;
    playBtn.querySelector('svg').innerHTML = PAUSE_ICON;
  });

  widget.bind(SC.Widget.Events.PAUSE, () => {
    playing = false;
    playBtn.querySelector('svg').innerHTML = PLAY_ICON;
  });

  widget.bind(SC.Widget.Events.FINISH, () => {
    playing = false;
    playBtn.querySelector('svg').innerHTML = PLAY_ICON;
    updateSeekFill(0, 1);
  });

  widget.bind(SC.Widget.Events.PLAY_PROGRESS, (e) => {
    posEl.textContent = fmt(e.currentPosition);
    if (e.relativePosition > 0) {
      duration = e.currentPosition / e.relativePosition;
      seekBar.max = Math.floor(duration);
      durEl.textContent = fmt(duration);
    }
    seekBar.value = Math.floor(e.currentPosition);
    updateSeekFill(seekBar.value, seekBar.max);
  });

  playBtn.addEventListener('click', () => {
    playing ? widget.pause() : widget.play();
  });

  seekBar.addEventListener('input', () => {
    widget.seekTo(Number(seekBar.value));
    updateSeekFill(seekBar.value, seekBar.max);
  });

  // Skip buttons — seek ±10 seconds
  document.getElementById('prevBtn').addEventListener('click', () => {
    widget.getPosition((pos) => {
      widget.seekTo(Math.max(0, pos - 10000));
    });
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    widget.getPosition((pos) => {
      widget.seekTo(Math.min(duration, pos + 10000));
    });
  });
</script>
</body>
</html>
