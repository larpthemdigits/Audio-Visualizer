kind = "web"
previewPath = "/"
title = "wishedletters"
version = "1.0.0"
id = "artifacts/wishedletters"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26060

[services.development]
run = "pnpm --filter @workspace/wishedletters run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wishedletters", "run", "build" ]
publicDir = "artifacts/wishedletters/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26060"
BASE_PATH = "/"
